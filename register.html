<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro - BIGFOOT Connect</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.0/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1rem;
    }

    .logo img {
      height: 60px;
    }

    .logo span {
      margin-top: 0.5rem;
      font-size: 1.2rem;
      font-weight: bold;
      color: #FF6B35;
    }

    form {
      background: #111;
      padding: 2rem;
      border-radius: 8px;
      width: 320px;
      box-shadow: 0 0 12px rgba(0, 255, 180, 0.1);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    form h2 {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.6rem;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 0.6rem;
      background: #1F948C;
      color: white;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #14635e;
    }

    #message {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      text-align: center;
    }

    .login-link {
      text-align: center;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }

    .login-link a {
      color: #1F948C;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .back-home {
      margin-top: 1rem;
      text-align: center;
    }

    .back-home a {
      color: #ccc;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .back-home a:hover {
      color: #FF6B35;
    }
  </style>
</head>

<body>

  <!-- Seletor de idioma -->
  <div style="position:absolute; top:1rem; right:1rem;">
    <select id="langSelect" onchange="setLang(this.value)">
      <option value="pt-BR">Português</option>
      <option value="en-US">English</option>
    </select>
  </div>

  <!-- Logo no topo -->
  <div class="logo">
    <img src="images/logo.png" alt="BIGFOOT Logo" />
    <span>BIGFOOT Connect</span>
  </div>

  <form id="registerForm">
    <h2 id="create-account">Criar Conta</h2>
    <input type="text" id="username" placeholder="Nome de usuário" required />
    <input type="email" id="email" placeholder="E-mail (opcional)" />
    <input type="password" id="password" placeholder="Senha" required />
    <button type="submit" id="register-btn">Registrar</button>
    <p id="message"></p>

    <div class="login-link">
      <p id="has-account">Já tem conta? <a href="login.html" id="login-link">Entrar</a></p>
    </div>
  </form>

  <!-- Botão para voltar à home -->
  <div class="back-home">
    <a href="index.html" id="back-home">← Voltar para a Home</a>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      'https://cfvcihpfnxavcwublvcg.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmdmNpaHBmbnhhdmN3dWJsdmNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1NjY4OTAsImV4cCI6MjA2NjE0Mjg5MH0.iwakKxIwXa-0v5FEmm5HRkwQIRwqZ0VJJYXqv1SnzQE'
    );

    const form = document.getElementById('registerForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        message.style.color = 'red';
        message.textContent = 'Preencha todos os campos obrigatórios.';
        return;
      }

      const { data: existingUser } = await supabase
        .from('profiles')
        .select('*')
        .eq('username', username)
        .single();

      if (existingUser) {
        message.style.color = 'red';
        message.textContent = 'Nome de usuário já está em uso.';
        return;
      }

      const saltRounds = 10;
      const passwordHash = bcrypt.hashSync(password, saltRounds);

      const { error } = await supabase
        .from('profiles')
        .insert([{
          username,
          email: email || null,
          password_hash: passwordHash
        }]);

      if (error) {
        message.style.color = 'red';
        message.textContent = 'Erro ao criar conta: ' + error.message;
        return;
      }

      message.style.color = 'green';
      message.textContent = 'Conta criada com sucesso! Redirecionando...';
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2000);
    });
  </script>
  <script>
    function setLang(lang) {
      localStorage.setItem('lang', lang);
      location.reload();
    }

    function applyLang() {
      const lang = localStorage.getItem('lang') || 'pt-BR';
      document.getElementById('langSelect').value = lang;

      if (lang === 'en-US') {
        document.getElementById('create-account').textContent = 'Create Account';
        document.getElementById('username').placeholder = 'Username';
        document.getElementById('email').placeholder = 'Email (optional)';
        document.getElementById('password').placeholder = 'Password';
        document.getElementById('register-btn').textContent = 'Register';
        document.getElementById('has-account').innerHTML = `Already have an account? <a href="login.html" id="login-link">Login</a>`;
        document.getElementById('back-home').textContent = '← Back to Home';
      }
    }

    applyLang();
  </script>
</body>

</html>
