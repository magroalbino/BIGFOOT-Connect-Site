<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro - BIGFOOT Connect</title>
  <link rel="icon" href="images/favicon.ico" type="image/x-icon" />

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    /* Seu estilo permanece igual */
    body {
      font-family: sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    #languageSwitcher {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: #111;
      color: #FF6B35;
      border: 1px solid #333;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1rem;
    }

    .logo img {
      height: 60px;
    }

    .logo span {
      margin-top: 0.5rem;
      font-size: 1.2rem;
      font-weight: bold;
      color: #FF6B35;
    }

    form {
      background: #111;
      padding: 2rem;
      border-radius: 8px;
      width: 320px;
      box-shadow: 0 0 12px rgba(0, 255, 180, 0.1);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    form h2 {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.6rem;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 0.6rem;
      background: #1F948C;
      color: white;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #14635e;
    }

    #message {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      text-align: center;
    }

    .login-link {
      text-align: center;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }

    .login-link a {
      color: #1F948C;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .back-home {
      margin-top: 1rem;
      text-align: center;
    }

    .back-home a {
      color: #ccc;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .back-home a:hover {
      color: #FF6B35;
    }
  </style>
</head>

<body>
  <select id="languageSwitcher">
    <option value="en">English</option>
    <option value="pt">Português</option>
  </select>

  <div class="logo">
    <img src="images/logo.png" alt="BIGFOOT Logo" />
    <span>BIGFOOT Connect</span>
  </div>

  <form id="registerForm">
    <h2 id="title">Criar Conta</h2>
    <input type="email" id="email" placeholder="E-mail" required />
    <input type="password" id="password" placeholder="Senha" required />
    <button type="submit" id="registerBtn">Registrar</button>
    <p id="message"></p>

    <div class="login-link">
      <p><a href="login.html" id="loginLink">Já tem conta? Entrar</a></p>
    </div>
  </form>

  <div class="back-home">
    <a href="index.html" id="backHome">← Voltar para a Home</a>
  </div>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyAhziJbG5Pxg0UYvq784YH4zXpsdKfh7AY",
      authDomain: "bigfoot-connect.firebaseapp.com",
      projectId: "bigfoot-connect",
      storageBucket: "bigfoot-connect.appspot.com",
      messagingSenderId: "177999879162",
      appId: "1:177999879162:web:a1ea739930cac97475e243"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const translations = {
      pt: {
        title: "Criar Conta",
        email: "E-mail (obrigatório)",
        password: "Senha",
        register: "Registrar",
        loginLink: "Já tem conta? Entrar",
        backHome: "← Voltar para a Home",
        fillRequired: "Preencha todos os campos obrigatórios.",
        success: "Conta criada com sucesso! Redirecionando...",
        error: "Erro ao criar conta:"
      },
      en: {
        title: "Create Account",
        email: "Email (required)",
        password: "Password",
        register: "Register",
        loginLink: "Already have an account? Log in",
        backHome: "← Back to Home",
        fillRequired: "Please fill in all required fields.",
        success: "Account created successfully! Redirecting...",
        error: "Error creating account:"
      }
    };

    function applyTranslations(lang) {
      const t = translations[lang];
      document.getElementById("title").textContent = t.title;
      document.getElementById("email").placeholder = t.email;
      document.getElementById("password").placeholder = t.password;
      document.getElementById("registerBtn").textContent = t.register;
      document.getElementById("loginLink").textContent = t.loginLink;
      document.getElementById("backHome").textContent = t.backHome;
    }

    document.getElementById("registerForm").addEventListener("submit", async (event) => {
      event.preventDefault();

      const lang = localStorage.getItem("lang") || "pt";
      const t = translations[lang];
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const message = document.getElementById("message");

      message.textContent = "";
      message.style.color = "white";

      if (!email || !password) {
        message.style.color = "red";
        message.textContent = t.fillRequired;
        return;
      }

      try {
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get("ref");

        await db.collection("users").doc(user.uid).set({
          email,
          referidoPor: ref || null,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        message.style.color = "green";
        message.textContent = t.success;

        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      } catch (error) {
        message.style.color = "red";
        message.textContent = `${t.error} ${error.message}`;
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      const languageSwitcher = document.getElementById("languageSwitcher");
      const savedLang = localStorage.getItem("lang") || "pt";

      languageSwitcher.value = savedLang;
      applyTranslations(savedLang);

      languageSwitcher.addEventListener("change", (e) => {
        const lang = e.target.value;
        localStorage.setItem("lang", lang);
        applyTranslations(lang);
      });
    });
  </script>
</body>

</html>
