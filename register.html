<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro - BIGFOOT Connect</title>
  <link rel="icon" href="images/favicon.ico" type="image/x-icon" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.0/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    #languageSwitcher {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: #111;
      color: #FF6B35;
      border: 1px solid #333;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1rem;
    }

    .logo img {
      height: 60px;
    }

    .logo span {
      margin-top: 0.5rem;
      font-size: 1.2rem;
      font-weight: bold;
      color: #FF6B35;
    }

    form {
      background: #111;
      padding: 2rem;
      border-radius: 8px;
      width: 320px;
      box-shadow: 0 0 12px rgba(0, 255, 180, 0.1);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    form h2 {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.6rem;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 0.6rem;
      background: #1F948C;
      color: white;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #14635e;
    }

    #message {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      text-align: center;
    }

    .login-link {
      text-align: center;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }

    .login-link a {
      color: #1F948C;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .back-home {
      margin-top: 1rem;
      text-align: center;
    }

    .back-home a {
      color: #ccc;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .back-home a:hover {
      color: #FF6B35;
    }
  </style>
</head>

<body>
  <select id="languageSwitcher">
    <option value="en">English</option>
    <option value="pt">Português</option>
  </select>

  <div class="logo">
    <img src="images/logo.png" alt="BIGFOOT Logo" />
    <span>BIGFOOT Connect</span>
  </div>

  <form id="registerForm">
    <h2 id="title">Criar Conta</h2>
    <input type="text" id="username" placeholder="Nome de usuário" required />
    <input type="email" id="email" placeholder="E-mail (opcional)" />
    <input type="password" id="password" placeholder="Senha" required />
    <button type="submit" id="registerBtn">Registrar</button>
    <p id="message"></p>

    <div class="login-link">
      <p><a href="login.html" id="loginLink">Já tem conta? Entrar</a></p>
    </div>
  </form>

  <div class="back-home">
    <a href="index.html" id="backHome">← Voltar para a Home</a>
  </div>

  <script>
    const translations = {
      pt: {
        title: "Criar Conta",
        username: "Nome de usuário",
        email: "E-mail (opcional)",
        password: "Senha",
        register: "Registrar",
        loginLink: "Já tem conta? Entrar",
        backHome: "← Voltar para a Home",
        fillRequired: "Preencha todos os campos obrigatórios.",
        userTaken: "Nome de usuário já está em uso.",
        success: "Conta criada com sucesso! Redirecionando...",
        error: "Erro ao criar conta:"
      },
      en: {
        title: "Create Account",
        username: "Username",
        email: "Email (optional)",
        password: "Password",
        register: "Register",
        loginLink: "Already have an account? Log in",
        backHome: "← Back to Home",
        fillRequired: "Please fill in all required fields.",
        userTaken: "Username is already taken.",
        success: "Account created successfully! Redirecting...",
        error: "Error creating account:"
      }
    };

    function applyTranslations(lang) {
      const t = translations[lang];
      document.getElementById("title").textContent = t.title;
      document.getElementById("username").placeholder = t.username;
      document.getElementById("email").placeholder = t.email;
      document.getElementById("password").placeholder = t.password;
      document.getElementById("registerBtn").textContent = t.register;
      document.getElementById("loginLink").textContent = t.loginLink;
      document.getElementById("backHome").textContent = t.backHome;
    }

    const supabase = window.supabase.createClient(
      'https://cfvcihpfnxavcwublvcg.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmdmNpaHBmbnhhdmN3dWJsdmNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1NjY4OTAsImV4cCI6MjA2NjE0Mjg5MH0.iwakKxIwXa-0v5FEmm5HRkwQIRwqZ0VJJYXqv1SnzQE'
    );

    const form = document.getElementById('registerForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const lang = localStorage.getItem("lang") || "pt";
      const t = translations[lang];

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        message.style.color = 'red';
        message.textContent = t.fillRequired;
        return;
      }

      const { data: existingUser } = await supabase
        .from('profiles')
        .select('*')
        .eq('username', username)
        .single();

      if (existingUser) {
        message.style.color = 'red';
        message.textContent = t.userTaken;
        return;
      }

      const saltRounds = 10;
      const passwordHash = dcodeIO.bcrypt.hashSync(password, saltRounds); // CORRIGIDO

      // Captura ?ref= do link
const urlParams = new URLSearchParams(window.location.search);
const ref = urlParams.get("ref");

const { error } = await supabase
  .from('profiles')
  .insert([{
    username,
    email: email || null,
    password_hash: passwordHash,
    referidoPor: ref || null
  }]);

      if (error) {
        message.style.color = 'red';
        message.textContent = `${t.error} ${error.message}`;
        return;
      }

      message.style.color = 'green';
      message.textContent = t.success;
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2000);
    });

    document.addEventListener("DOMContentLoaded", () => {
      const languageSwitcher = document.getElementById("languageSwitcher");
      const savedLang = localStorage.getItem("lang") || "pt";

      languageSwitcher.value = savedLang;
      applyTranslations(savedLang);

      languageSwitcher.addEventListener("change", (e) => {
        const lang = e.target.value;
        localStorage.setItem("lang", lang);
        applyTranslations(lang);
      });
    });
  </script>
</body>

</html>
