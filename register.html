<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registro - BIGFOOT Connect</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.0/dist/umd/supabase.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        form {
            background: #111;
            padding: 2rem;
            border-radius: 8px;
            width: 300px;
        }

        input {
            width: 100%;
            margin-bottom: 1rem;
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 0.5rem;
            background: #1F948C;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #14635e;
        }

        #message {
            margin-top: 1rem;
            font-size: 0.9rem;
            text-align: center;
        }

        .login-link {
            text-align: center;
            margin-top: 1rem;
        }

        .login-link a {
            color: #1F948C;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <form id="registerForm">
        <h2>Registrar</h2>
        <input type="text" id="username" placeholder="Nome de usuário" required />
        <input type="password" id="password" placeholder="Senha" required />
        <button type="submit">Criar conta</button>
        <p id="message"></p>
        <div class="login-link">
            <p>Já tem conta? <a href="index.html">Login</a></p>
        </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>

    <script>
        const supabase = window.supabase.createClient(
            'https://cfvcihpfnxavcwublvcg.supabase.co',
            'SUA_ANON_PUBLIC_KEY_AQUI'
        );

        const form = document.getElementById('registerForm');
        const message = document.getElementById('message');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                message.style.color = 'red';
                message.textContent = 'Preencha todos os campos.';
                return;
            }

            // Gerar hash da senha usando bcryptjs (cliente)
            const saltRounds = 10;
            const passwordHash = bcrypt.hashSync(password, saltRounds);

            // Salvar no Supabase na tabela profiles
            const { data, error } = await supabase
                .from('profiles')
                .insert([{ username: username, password_hash: passwordHash }]);

            if (error) {
                if (error.code === '23505') { // Unique violation
                    message.style.color = 'red';
                    message.textContent = 'Nome de usuário já está em uso.';
                } else {
                    message.style.color = 'red';
                    message.textContent = 'Erro ao criar conta: ' + error.message;
                }
                return;
            }

            message.style.color = 'green';
            message.textContent = 'Conta criada com sucesso! Redirecionando...';

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2500);
        });
    </script>
</body>

</html>
