<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - BIGFOOT Connect</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.0/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        form {
            background: #111;
            padding: 2rem;
            border-radius: 8px;
            width: 300px;
        }

        input {
            width: 100%;
            margin-bottom: 1rem;
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 0.5rem;
            background: #FF6B35;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #cc5125;
        }

        #message {
            margin-top: 1rem;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>

<body>
    <form onsubmit="loginUser(event)">
        <h2>Entrar</h2>
        <input type="text" id="username" placeholder="Nome de usuário" required />
        <input type="password" id="password" placeholder="Senha" required />
        <button type="submit">Login</button>
        <p id="message"></p>
        <p style="margin-top:1rem;">
            <a href="register.html" style="color: #FF6B35;">Não tem conta? Registre-se</a>
        </p>
    </form>

    <script>
        const supabase = window.supabase.createClient(
            'https://cfvcihpfnxavcwublvcg.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmdmNpaHBmbnhhdmN3dWJsdmNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1NjY4OTAsImV4cCI6MjA2NjE0Mjg5MH0.iwakKxIwXa-0v5FEmm5HRkwQIRwqZ0VJJYXqv1SnzQE'
        );

        async function loginUser(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const message = document.getElementById('message');

            // 1. Buscar usuário pelo username
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('username', username)
                .single();

            if (error || !data) {
                message.style.color = 'red';
                message.textContent = 'Usuário não encontrado.';
                return;
            }

            // 2. Verificar senha
            const isMatch = bcrypt.compareSync(password, data.password_hash);
            if (!isMatch) {
                message.style.color = 'red';
                message.textContent = 'Senha incorreta.';
                return;
            }

            // 3. Login bem-sucedido - Salvar dados no localStorage e redirecionar
            localStorage.setItem('user', JSON.stringify({
                id: data.id,
                username: data.username
            }));

            message.style.color = 'green';
            message.textContent = 'Login realizado com sucesso!';

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        }
    </script>
</body>

</html>
