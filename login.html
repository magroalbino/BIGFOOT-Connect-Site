<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - BIGFOOT Connect</title>
  <link rel="icon" href="images/favicon.ico" type="image/x-icon" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.0/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .top-bar {
      position: absolute;
      top: 1rem;
      right: 1rem;
    }

    select#languageSwitcher {
      background: #111;
      color: #FF6B35;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.25rem 0.5rem;
      cursor: pointer;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1rem;
    }

    .logo img {
      height: 60px;
    }

    .logo span {
      margin-top: 0.5rem;
      font-size: 1.2rem;
      font-weight: bold;
      color: #FF6B35;
    }

    form {
      background: #111;
      padding: 2rem;
      border-radius: 8px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    input {
      width: 100%;
      padding: 0.5rem;
      border: none;
      border-radius: 4px;
    }

    button {
      width: 100%;
      padding: 0.5rem;
      background: #FF6B35;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #cc5125;
    }

    #message {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      text-align: center;
    }

    .register-link {
      margin-top: 1rem;
      text-align: center;
    }

    .register-link a {
      color: #FF6B35;
      text-decoration: none;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    .back-home {
      margin-top: 1.5rem;
      text-align: center;
    }

    .back-home a {
      color: #ccc;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .back-home a:hover {
      color: #FF6B35;
    }
  </style>
</head>

<body>
  <!-- Seletor de idioma -->
  <div class="top-bar">
    <select id="languageSwitcher">
      <option value="en">English</option>
      <option value="pt">Português</option>
    </select>
  </div>

  <div class="logo">
    <img src="images/logo.png" alt="BIGFOOT Logo" />
    <span>BIGFOOT Connect</span>
  </div>

  <form onsubmit="loginUser(event)">
    <h2 id="form-title">Login</h2>
    <input type="text" id="username" placeholder="Username" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit" id="login-button">Login</button>
    <p id="message"></p>

    <div class="register-link">
      <a href="register.html" id="register-link">Don't have an account? Register</a>
    </div>
  </form>

  <div class="back-home">
    <a href="index.html" id="back-home">← Back to Home</a>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      'https://cfvcihpfnxavcwublvcg.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmdmNpaHBmbnhhdmN3dWJsdmNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1NjY4OTAsImV4cCI6MjA2NjE0Mjg5MH0.iwakKxIwXa-0v5FEmm5HRkwQIRwqZ0VJJYXqv1SnzQE'
    );

    const translations = {
      en: {
        formTitle: "Login",
        username: "Username",
        password: "Password",
        loginBtn: "Login",
        registerLink: "Don't have an account? Register",
        backHome: "← Back to Home",
        fillAll: "Please fill in all fields.",
        notFound: "User not found.",
        bcryptError: "Error: bcrypt library not loaded.",
        wrongPassword: "Incorrect password.",
        success: "Login successful!",
        loginError: "Error during login:"
      },
      pt: {
        formTitle: "Entrar",
        username: "Nome de usuário",
        password: "Senha",
        loginBtn: "Login",
        registerLink: "Não tem conta? Registre-se",
        backHome: "← Voltar para a Home",
        fillAll: "Preencha todos os campos.",
        notFound: "Usuário não encontrado.",
        bcryptError: "Erro: Biblioteca bcrypt não carregada.",
        wrongPassword: "Senha incorreta.",
        success: "Login realizado com sucesso!",
        loginError: "Erro ao processar login:"
      }
    };

    function applyTranslations(lang) {
      const t = translations[lang];
      document.getElementById("form-title").textContent = t.formTitle;
      document.getElementById("username").placeholder = t.username;
      document.getElementById("password").placeholder = t.password;
      document.getElementById("login-button").textContent = t.loginBtn;
      document.getElementById("register-link").textContent = t.registerLink;
      document.getElementById("back-home").textContent = t.backHome;
    }

    async function loginUser(event) {
      event.preventDefault();

      const lang = localStorage.getItem("lang") || "en";
      const t = translations[lang];

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const message = document.getElementById('message');

      message.textContent = '';
      message.style.color = 'white';

      if (!username || !password) {
        message.style.color = 'red';
        message.textContent = t.fillAll;
        return;
      }

      try {
        const { data: userData, error } = await supabase
          .from('profiles')
          .select('*')
          .eq('username', username)
          .single();

        if (error || !userData) {
          message.style.color = 'red';
          message.textContent = t.notFound;
          return;
        }

        if (typeof dcodeIO === 'undefined' || typeof dcodeIO.bcrypt === 'undefined') {
          message.style.color = 'red';
          message.textContent = t.bcryptError;
          return;
        }

        const isPasswordValid = dcodeIO.bcrypt.compareSync(password, userData.password_hash);

        if (!isPasswordValid) {
          message.style.color = 'red';
          message.textContent = t.wrongPassword;
          return;
        }

        localStorage.setItem('loggedIn', 'true');
        localStorage.setItem('userId', userData.id);
        localStorage.setItem('user', JSON.stringify({
          id: userData.id,
          username: userData.username
        }));

        message.style.color = 'green';
        message.textContent = t.success;

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);
      } catch (err) {
        message.style.color = 'red';
        message.textContent = t.loginError + ' ' + err.message;
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const languageSwitcher = document.getElementById("languageSwitcher");
      const savedLang = localStorage.getItem("lang") || "en";
      languageSwitcher.value = savedLang;
      applyTranslations(savedLang);

      languageSwitcher.addEventListener("change", (e) => {
        const lang = e.target.value;
        localStorage.setItem("lang", lang);
        applyTranslations(lang);
      });
    });

    window.loginUser = loginUser;
  </script>
</body>

</html>
