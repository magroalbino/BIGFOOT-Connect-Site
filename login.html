<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - BIGFOOT Connect</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.0/dist/umd/supabase.min.js"></script>
    <!-- Carregando bcryptjs via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1rem;
        }

        .logo img {
            height: 60px;
        }

        .logo span {
            margin-top: 0.5rem;
            font-size: 1.2rem;
            font-weight: bold;
            color: #FF6B35;
        }

        form {
            background: #111;
            padding: 2rem;
            border-radius: 8px;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 0.5rem;
            background: #FF6B35;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #cc5125;
        }

        #message {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            text-align: center;
        }

        .register-link {
            margin-top: 1rem;
            text-align: center;
        }

        .register-link a {
            color: #FF6B35;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .back-home {
            margin-top: 1.5rem;
            text-align: center;
        }

        .back-home a {
            color: #ccc;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .back-home a:hover {
            color: #FF6B35;
        }
    </style>
</head>

<body>
    <div class="logo">
        <img src="images/logo.png" alt="BIGFOOT Logo" />
        <span>BIGFOOT Connect</span>
    </div>

    <form onsubmit="loginUser(event)">
        <h2>Entrar</h2>
        <input type="text" id="username" placeholder="Nome de usuário" required />
        <input type="password" id="password" placeholder="Senha" required />
        <button type="submit">Login</button>
        <p id="message"></p>

        <div class="register-link">
            <a href="register.html">Não tem conta? Registre-se</a>
        </div>
    </form>

    <div class="back-home">
        <a href="index.html">← Voltar para a Home</a>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://cfvcihpfnxavcwublvcg.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmdmNpaHBmbnhhdmN3dWJsdmNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1NjY4OTAsImV4cCI6MjA2NjE0Mjg5MH0.iwakKxIwXa-0v5FEmm5HRkwQIRwqZ0VJJYXqv1SnzQE'
        );

        async function loginUser(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const message = document.getElementById('message');

            message.textContent = '';
            message.style.color = 'white';

            if (!username || !password) {
                message.style.color = 'red';
                message.textContent = 'Preencha todos os campos.';
                return;
            }

            try {
                const { data: userData, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('username', username)
                    .single();

                if (error || !userData) {
                    message.style.color = 'red';
                    message.textContent = 'Usuário não encontrado.';
                    return;
                }

                if (typeof dcodeIO === 'undefined' || typeof dcodeIO.bcrypt === 'undefined') {
                    message.style.color = 'red';
                    message.textContent = 'Erro: Biblioteca bcrypt não carregada.';
                    return;
                }

                const isPasswordValid = dcodeIO.bcrypt.compareSync(password, userData.password_hash);

                if (!isPasswordValid) {
                    message.style.color = 'red';
                    message.textContent = 'Senha incorreta.';
                    return;
                }

                // Marca o usuário como logado
                localStorage.setItem('loggedIn', 'true');

                localStorage.setItem('user', JSON.stringify({
                    id: userData.id,
                    username: userData.username
                }));

                message.style.color = 'green';
                message.textContent = 'Login realizado com sucesso!';

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } catch (err) {
                message.style.color = 'red';
                message.textContent = 'Erro ao processar login: ' + err.message;
            }
        }

        // Expor globalmente
        window.loginUser = loginUser;
    </script>
</body>

</html>
