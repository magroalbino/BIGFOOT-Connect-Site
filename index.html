<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIGFOOT Connect</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0e0e0e;
            color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: #1a1a1a;
            border-bottom: 1px solid #333;
        }

        .logo {
            display: flex;
            align-items: center;
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            cursor: pointer;
            color: #FF6B35;
        }

        .logo-link:hover .logo-name,
        .logo-link:hover img {
            color: #cc5125;
            filter: brightness(0.8);
        }

        .logo-link img {
            height: 40px;
        }

        .logo-name {
            font-weight: bold;
            font-size: 1.1rem;
            user-select: none;
            color: inherit;
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        nav a,
        nav span {
            text-decoration: none;
            color: #FF6B35;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #fff;
        }

        #languageSwitcher {
            margin-left: 1rem;
            background: #1a1a1a;
            color: #FF6B35;
            border: 1px solid #333;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }

        main {
            flex: 1;
            padding: 4rem 1rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        main h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        main p {
            max-width: 700px;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: #ccc;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        .cta-buttons a {
            background-color: #FF6B35;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.2s;
        }

        .cta-buttons a:hover {
            background-color: #cc5125;
        }

        .hero-image {
            max-width: 400px;
            width: 100%;
            border-radius: 12px;
            margin-bottom: 4rem;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.85;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .divider {
            width: 100%;
            height: 1px;
            background: #333;
            margin: 3rem 0;
        }

        footer {
            text-align: center;
            padding: 1rem;
            background-color: #1a1a1a;
            font-size: 0.9rem;
            color: #777;
        }

        @media (max-width: 480px) {
            main h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <a href="/index" class="logo-link">
                <img src="./images/logo.png" alt="BIGFOOT Logo" />
                <span class="logo-name">BIGFOOT Connect</span>
            </a>
        </div>
        <div class="nav-container">
            <nav></nav>
            <select id="languageSwitcher">
                <option value="en">English</option>
                <option value="pt">Português</option>
            </select>
        </div>
    </header>

    <main>
        <h1>Conecte. Compartilhe. Ganhe.</h1>
        <p>Com o <strong>BIGFOOT Connect</strong>, você compartilha sua internet ociosa, ajuda a descentralizar a web e
            ainda recebe recompensas em <strong>BIG</strong>. Baixe o app, conecte e comece agora mesmo!</p>
        <div class="cta-buttons">
            <a href="/downloads/bigfoot-windows.exe">Windows</a>
            <a href="/downloads/bigfoot-mac.dmg">macOS</a>
            <a href="/downloads/bigfoot-linux.AppImage">Linux</a>
        </div>
        <img src="./images/logo.png" alt="Preview do App" class="hero-image" />
    </main>

    <footer>
        © 2025 BIGFOOT Connect. Todos os direitos reservados.
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loggedIn = localStorage.getItem('loggedIn') === 'true';
            const userJson = localStorage.getItem('user');
            const username = userJson ? JSON.parse(userJson).username : null;

            const nav = document.querySelector('nav');
            if (!nav) return;

            if (loggedIn && username) {
                nav.innerHTML = `
          <span style="color:#FF6B35;">Olá, ${username}</span>
          <a href="/dashboard">Dashboard</a>
          <a href="#" id="logout">Sair</a>
        `;

                document.getElementById('logout').addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.clear();
                    window.location.href = 'index.html';
                });
            } else {
                nav.innerHTML = `
          <a href="login.html">Login</a>
          <a href="register.html">Criar conta</a>
        `;
            }
        });
    </script>

    <script>
        const translations = {
            en: {
                heroTitle: "Connect. Share. Earn.",
                heroText: "With <strong>BIGFOOT Connect</strong>, you share your idle internet, help decentralize the web, and get rewarded in <strong>BIG</strong>. Download the app, connect, and get started now!",
                login: "Login",
                register: "Register",
                dashboard: "Dashboard",
                logout: "Logout"
            },
            pt: {
                heroTitle: "Conecte. Compartilhe. Ganhe.",
                heroText: "Com o <strong>BIGFOOT Connect</strong>, você compartilha sua internet ociosa, ajuda a descentralizar a web e ainda recebe recompensas em <strong>BIG</strong>. Baixe o app, conecte e comece agora mesmo!",
                login: "Login",
                register: "Criar conta",
                dashboard: "Dashboard",
                logout: "Sair"
            }
        };

        function applyTranslations(lang) {
            const t = translations[lang];
            document.querySelector("main h1").innerHTML = t.heroTitle;
            document.querySelector("main p").innerHTML = t.heroText;

            const nav = document.querySelector("nav");
            const loggedIn = localStorage.getItem('loggedIn') === 'true';
            const userJson = localStorage.getItem('user');
            const username = userJson ? JSON.parse(userJson).username : null;

            if (loggedIn && username) {
                nav.innerHTML = `
          <span style="color:#FF6B35;">Olá, ${username}</span>
          <a href="/dashboard">${t.dashboard}</a>
          <a href="#" id="logout">${t.logout}</a>
        `;

                document.getElementById('logout').addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.clear();
                    window.location.href = 'index.html';
                });
            } else {
                nav.innerHTML = `
          <a href="login.html">${t.login}</a>
          <a href="register.html">${t.register}</a>
        `;
            }
        }

        const defaultLang = localStorage.getItem("lang") || "pt";
        document.getElementById("languageSwitcher").value = defaultLang;
        applyTranslations(defaultLang);

        document.getElementById("languageSwitcher").addEventListener("change", (e) => {
            const lang = e.target.value;
            localStorage.setItem("lang", lang);
            applyTranslations(lang);
        });
    </script>
</body>

</html>
