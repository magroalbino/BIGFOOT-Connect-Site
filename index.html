<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIGFOOT Connect</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0e0e0e;
            color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: #1a1a1a;
            border-bottom: 1px solid #333;
        }

        .logo {
            display: flex;
            align-items: center;
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            cursor: pointer;
            color: #FF6B35;
        }

        .logo-link:hover .logo-name,
        .logo-link:hover img {
            color: #cc5125;
            filter: brightness(0.8);
        }

        .logo-link img {
            height: 40px;
        }

        .logo-name {
            font-weight: bold;
            font-size: 1.1rem;
            user-select: none;
            color: inherit;
        }

        nav {
            display: flex;
            align-items: center;
        }

        nav a {
            margin-left: 1.5rem;
            text-decoration: none;
            color: #FF6B35;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #fff;
        }

        select {
            margin-left: 1.5rem;
            background: #1a1a1a;
            color: #FF6B35;
            border: 1px solid #333;
            padding: 0.3rem 0.5rem;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <a href="/index" class="logo-link">
                <img src="./images/logo.png" alt="BIGFOOT Logo" />
                <span class="logo-name">BIGFOOT Connect</span>
            </a>
        </div>
        <nav>
            <a href="/login">Login</a>
            <a href="/register">Criar conta</a>
            <select id="languageSwitcher">
                <option value="en">English</option>
                <option value="pt">Português</option>
            </select>
        </nav>
    </header>

    <!-- RESTANTE DO SEU HTML ORIGINAL -->

    <footer>
        © 2025 BIGFOOT Connect. Todos os direitos reservados.
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const languageSwitcher = document.getElementById('languageSwitcher');
            const lang = localStorage.getItem('lang') || 'en';
            languageSwitcher.value = lang;

            const translations = {
                en: {
                    'Conecte. Compartilhe. Ganhe.': 'Connect. Share. Earn.',
                    'Com o BIGFOOT Connect, você compartilha sua internet ociosa, ajuda a descentralizar a web e ainda recebe recompensas em BIG. Baixe o app, conecte e comece agora mesmo!': 'With BIGFOOT Connect, you share your unused internet, help decentralize the web, and earn BIG tokens. Download the app and get started now!',
                    'Whitepaper do Projeto': 'Project Whitepaper',
                    'Quer saber como o BIGFOOT Connect funciona, quais as tecnologias por trás e como você é recompensado por compartilhar sua internet? Confira nosso whitepaper completo.': 'Want to know how BIGFOOT Connect works, the technology behind it, and how you get rewarded for sharing your internet? Check out our full whitepaper.',
                    'Visualizar / Baixar Whitepaper': 'View / Download Whitepaper',
                    'Token BIG (BIG)': 'BIG Token (BIG)',
                    'O BIG é o token oficial do ecossistema BIGFOOT Connect. Usuários são recompensados em BIG por compartilharem internet ociosa e contribuírem com a descentralização da rede.': 'BIG is the official token of the BIGFOOT Connect ecosystem. Users are rewarded in BIG for sharing unused internet and contributing to network decentralization.',
                    'Roadmap do Projeto': 'Project Roadmap',
                    'Versão inicial com recursos básicos de compartilhamento e recompensas.': 'Initial version with basic sharing and reward features.',
                    'Suporte para pareamento com extensão de navegador e melhorias de UX.': 'Support for browser extension pairing and UX improvements.',
                    'Apps para Android e iOS, além de melhorias na estabilidade e segurança.': 'Apps for Android and iOS, plus stability and security improvements.',
                    'Parcerias estratégicas e expansão da base de usuários.': 'Strategic partnerships and user base expansion.',
                    'Novos modelos de recompensas, analytics e suporte a novos protocolos.': 'New reward models, analytics, and support for new protocols.'
                },
                pt: {}
            };

            const applyTranslations = () => {
                const lang = languageSwitcher.value;
                localStorage.setItem('lang', lang);
                const t = translations[lang];
                if (!t) return;
                document.querySelectorAll('h1, h2, p, a, strong, small').forEach(el => {
                    const original = el.innerText.trim();
                    if (t[original]) {
                        el.innerText = t[original];
                    }
                });
            };

            languageSwitcher.addEventListener('change', () => {
                applyTranslations();
            });

            applyTranslations();
        });
    </script>
</body>

</html>
