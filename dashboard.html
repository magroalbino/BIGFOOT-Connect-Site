<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard - BIGFOOT Connect</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0e0e0e;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header,
    footer {
      background-color: #1a1a1a;
      color: white;
    }

    main {
      flex: 1;
      padding: 2rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      color: #FF6B35;
      margin-bottom: 1.5rem;
    }

    .card {
      background-color: #1a1a1a;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 0 8px rgba(255, 107, 53, 0.15);
    }

    .card h2 {
      margin-top: 0;
      color: #fff;
    }

    .card p {
      color: #ccc;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      color: #777;
    }

    button.logout-btn {
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      background-color: #FF6B35;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    button.logout-btn:hover {
      background-color: #cc5125;
    }

    /* Ajustes para o logo + nome igual ao index.html */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      height: 40px;
    }

    .logo a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      cursor: pointer;
      color: #FF6B35;
      transition: color 0.2s, filter 0.2s;
    }

    .logo a:hover span,
    .logo a:hover img {
      color: #cc5125;
      filter: brightness(0.8);
    }

    .logo a img {
      height: 40px;
      transition: filter 0.2s;
    }

    .logo a span {
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header
    style="display:flex; justify-content:space-between; align-items:center; padding:1rem 2rem; border-bottom:1px solid #333;">
    <div class="logo">
      <a href="index.html">
        <img src="/images/logo.png" alt="BIGFOOT Logo" />
        <span>BIGFOOT Connect</span>
      </a>
    </div>
    <div style="display:flex; gap:1rem; align-items:center;">
      <button class="logout-btn" aria-label="Sair do sistema">Sair</button>
    </div>
  </header>

  <!-- Conteúdo principal -->
  <main>
    <h1>Bem-vindo ao seu Painel</h1>

    <div class="card">
      <h2>Seu progresso</h2>
      <p>Você já compartilhou: <strong>12.7 GB</strong></p>
      <p>Recompensas acumuladas: <strong>28.3 BIG</strong></p>
    </div>

    <div class="card">
      <h2>Endereço da sua Carteira Solana</h2>
      <input type="text" id="walletInput" placeholder="Digite seu endereço Solana"
        style="width: 100%; padding: 0.5rem; border-radius: 6px; border: 1px solid #ccc; margin-bottom: 0.5rem;" />
      <button id="saveWalletBtn" class="logout-btn">Salvar endereço</button>
      <p id="statusMessage" style="margin-top: 0.5rem; color: #FF6B35;"></p>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    © 2025 BIGFOOT Connect. Todos os direitos reservados.
  </footer>

  <!-- Script para integração com Supabase e controle -->
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://cfvcihpfnxavcwublvcg.supabase.co'
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmdmNpaHBmbnhhdmN3dWJsdmNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1NjY4OTAsImV4cCI6MjA2NjE0Mjg5MH0.iwakKxIwXa-0v5FEmm5HRkwQIRwqZ0VJJYXqv1SnzQE'

    const supabase = createClient(supabaseUrl, supabaseAnonKey)

    document.addEventListener('DOMContentLoaded', async () => {
      if (localStorage.getItem('loggedIn') !== 'true') {
        window.location.href = 'login.html'
        return
      }

      const userId = localStorage.getItem('userId')
      if (!userId) {
        alert('Usuário não identificado. Faça login novamente.')
        window.location.href = 'login.html'
        return
      }

      const walletInput = document.getElementById('walletInput')
      const saveBtn = document.getElementById('saveWalletBtn')
      const statusMessage = document.getElementById('statusMessage')

      async function loadWallet() {
        // Tenta localStorage primeiro
        const savedWalletLocal = localStorage.getItem('walletAddress')
        if (savedWalletLocal) {
          walletInput.value = savedWalletLocal
        }

        // Puxa do Supabase para garantir dados atualizados
        const { data, error } = await supabase
          .from('profiles')
          .select('wallet_address')
          .eq('id', userId)
          .single()

        if (error) {
          console.error('Erro ao buscar wallet do Supabase:', error)
        } else if (data?.wallet_address) {
          walletInput.value = data.wallet_address
          localStorage.setItem('walletAddress', data.wallet_address)
        }
      }

      await loadWallet()

      saveBtn.addEventListener('click', async () => {
        const walletAddress = walletInput.value.trim()

        if (!walletAddress) {
          statusMessage.textContent = 'Por favor, insira um endereço válido.'
          return
        }

        // Atualiza no Supabase
        const { error } = await supabase
          .from('profiles')
          .update({ wallet_address: walletAddress })
          .eq('id', userId)

        if (error) {
          statusMessage.textContent = 'Erro ao salvar endereço. Tente novamente.'
          console.error(error)
        } else {
          localStorage.setItem('walletAddress', walletAddress)
          statusMessage.textContent = 'Endereço salvo com sucesso!'
        }
      })

      // Logout
      const logoutBtn = document.querySelector('.logout-btn')
      logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('loggedIn')
        localStorage.removeItem('walletAddress')
        localStorage.removeItem('userId')
        window.location.href = 'index.html'
      })
    })
  </script>
</body>

</html>
