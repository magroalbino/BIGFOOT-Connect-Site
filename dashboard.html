<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard - BIGFOOT Connect</title>
  <link rel="icon" href="images/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "SUA_API_KEY",
      authDomain: "SEU_DOMINIO.firebaseapp.com",
      projectId: "SEU_PROJECT_ID",
      storageBucket: "SEU_BUCKET",
      messagingSenderId: "SEU_SENDER_ID",
      appId: "SEU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.addEventListener("DOMContentLoaded", () => {
      const walletInput = document.getElementById("walletInput");
      const saveWalletBtn = document.getElementById("saveWalletBtn");
      const statusMessage = document.getElementById("statusMessage");
      const refLink = document.getElementById("refLink");
      const refCount = document.getElementById("refCount");
      const logoutBtn = document.getElementById("logoutBtn");

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = "login.html";
          return;
        }

        const userDoc = doc(db, "users", user.uid);
        const userSnap = await getDoc(userDoc);

        if (!userSnap.exists()) {
          console.error("Usuário não encontrado no Firestore.");
          return;
        }

        const data = userSnap.data();
        document.querySelector("h1").textContent = `Bem-vindo ao seu Painel, ${data.username || user.email}`;
        walletInput.value = data.wallet_address || "";

        const shared = data.traffic?.reduce((sum, d) => sum + (d.dataSharedMB || 0), 0) || 0;
        const rewards = shared * 2.2;
        document.querySelector(".card p strong").textContent = `${(shared / 1024).toFixed(1)} GB`;
        document.querySelectorAll(".card p strong")[1].textContent = `${rewards.toFixed(1)} BIG`;

        renderChart(data.traffic || []);

        refLink.value = `${window.location.origin}/register.html?ref=${data.username}`;
        refCount.innerHTML = `Você já indicou <strong>${data.referrals?.length || 0}</strong> pessoas.`;

        saveWalletBtn.addEventListener("click", async () => {
          const address = walletInput.value.trim();
          if (!address) {
            statusMessage.textContent = "Por favor, insira um endereço válido.";
            return;
          }
          await updateDoc(userDoc, { wallet_address: address });
          statusMessage.textContent = "Endereço salvo com sucesso!";
        });

        logoutBtn.addEventListener("click", async () => {
          await signOut(auth);
          window.location.href = "index.html";
        });
      });

      function renderChart(data) {
        const labels = data.map(d => d.date);
        const values = data.map(d => d.dataSharedMB);

        new Chart(document.getElementById("dataChart"), {
          type: "line",
          data: {
            labels,
            datasets: [{
              label: "MB Compartilhados por dia",
              data: values,
              borderColor: "#FF6B35",
              backgroundColor: "rgba(255, 107, 53, 0.3)",
              fill: true,
              tension: 0.3
            }]
          },
          options: {
            responsive: true,
            scales: {
              y: { beginAtZero: true }
            }
          }
        });
      }
    });
  </script>
  <style>
    /* (mesmo CSS que você mandou, mantido) */
  </style>
</head>

<body>
  <header> <!-- igual ao seu --> </header>
  <main>
    <h1>Bem-vindo ao seu Painel</h1>
    <div class="card">
      <h2>Seu progresso</h2>
      <p>Você já compartilhou: <strong>0 GB</strong></p>
      <p>Recompensas acumuladas: <strong>0 BIG</strong></p>
      <canvas id="dataChart" style="margin-top: 1rem;"></canvas>
    </div>
    <div class="card">
      <h2>Endereço da sua Carteira Solana</h2>
      <input type="text" id="walletInput" placeholder="Digite seu endereço Solana" />
      <button id="saveWalletBtn" class="logout-btn">Salvar endereço</button>
      <p id="statusMessage"></p>
    </div>
    <section id="referral" class="card">
      <h2>👥 Indique amigos e ganhe BIG</h2>
      <p>Compartilhe seu link exclusivo:</p>
      <input type="text" id="refLink" readonly />
      <p id="refCount">Você já indicou <strong>0</strong> pessoas.</p>
    </section>
  </main>
  <footer>
    © 2025 BIGFOOT Connect. Todos os direitos reservados.
  </footer>
</body>

</html>
