<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - BIGFOOT Connect</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0e0e0e;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header,
    footer {
      background-color: #1a1a1a;
      color: white;
    }

    main {
      flex: 1;
      padding: 2rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      color: #FF6B35;
      margin-bottom: 1.5rem;
    }

    .card {
      background-color: #1a1a1a;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 0 8px rgba(255, 107, 53, 0.15);
    }

    .card h2 {
      margin-top: 0;
      color: #fff;
    }

    .card p {
      color: #ccc;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      color: #777;
    }

    button.logout-btn {
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      background-color: #FF6B35;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    button.logout-btn:hover {
      background-color: #cc5125;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      height: 40px;
    }

    .logo a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      cursor: pointer;
      color: #FF6B35;
      transition: color 0.2s, filter 0.2s;
    }

    .logo a:hover span,
    .logo a:hover img {
      color: #cc5125;
      filter: brightness(0.8);
    }

    .logo a img {
      height: 40px;
      transition: filter 0.2s;
    }

    .logo a span {
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header
    style="display:flex; justify-content:space-between; align-items:center; padding:1rem 2rem; border-bottom:1px solid #333;">
    <div class="logo">
      <a href="index.html">
        <img src="/images/logo.png" alt="BIGFOOT Logo" />
        <span>BIGFOOT Connect</span>
      </a>
    </div>
    <div style="display:flex; gap:1rem; align-items:center;">
      <button class="logout-btn" aria-label="Sair do sistema">Sair</button>
    </div>
  </header>

  <!-- Conteúdo principal -->
  <main>
    <h1>Bem-vindo ao seu Painel</h1>

    <div class="card">
      <h2>Seu progresso</h2>
      <p>Você já compartilhou: <strong>12.7 GB</strong></p>
      <p>Recompensas acumuladas: <strong>28.3 BIG</strong></p>
    </div>

    <div class="card">
      <h2>Carteira conectada</h2>
      <p>Endereço: <span id="walletDisplay">Não conectado</span></p>
      <button id="connectWallet" class="logout-btn">Conectar Phantom</button>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    © 2025 BIGFOOT Connect. Todos os direitos reservados.
  </footer>

  <!-- Script de conexão Phantom e Supabase -->
  <script>
    const SUPABASE_URL = "https://cfvcihpfnxavcwublvcg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmdmNpaHBmbnhhdmN3dWJsdmNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1NjY4OTAsImV4cCI6MjA2NjE0Mjg5MH0.iwakKxIwXa-0v5FEmm5HRkwQIRwqZ0VJJYXqv1SnzQE";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('loggedIn') !== 'true') {
        window.location.href = 'login.html';
        return;
      }

      const walletDisplay = document.getElementById('walletDisplay');
      const savedWallet = localStorage.getItem('walletAddress');
      if (savedWallet) {
        walletDisplay.textContent = savedWallet;
      }

      document.querySelector('.logout-btn').addEventListener('click', () => {
        localStorage.removeItem('loggedIn');
        localStorage.removeItem('walletAddress');
        localStorage.removeItem('userId');
        window.location.href = 'index.html';
      });

      document.getElementById('connectWallet').addEventListener('click', async () => {
        if (!window.solana?.isPhantom) {
          alert("Instale a carteira Phantom para conectar.");
          return;
        }

        try {
          const res = await window.solana.connect();
          const publicKey = res.publicKey.toString();
          walletDisplay.textContent = publicKey;
          localStorage.setItem('walletAddress', publicKey);

          // ID local (simulando autenticação)
          const userId = localStorage.getItem('userId') || crypto.randomUUID();
          localStorage.setItem('userId', userId);

          const { error } = await supabase
            .from('profiles')
            .upsert({ id: userId, wallet_address: publicKey }, { onConflict: 'id' });

          if (error) {
            console.error("Erro ao salvar na Supabase:", error);
          } else {
            console.log("Carteira salva com sucesso.");
          }

        } catch (err) {
          console.error("Erro ao conectar carteira:", err);
        }
      });
    });
  </script>
</body>

</html>
