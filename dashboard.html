<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - BIGFOOT Connect</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0e0e0e;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header,
    footer {
      background-color: #1a1a1a;
      color: white;
    }

    main {
      flex: 1;
      padding: 2rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      color: #FF6B35;
      margin-bottom: 1.5rem;
    }

    .card {
      background-color: #1a1a1a;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 0 8px rgba(255, 107, 53, 0.15);
    }

    .card h2 {
      margin-top: 0;
      color: #fff;
    }

    .card p {
      color: #ccc;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      color: #777;
    }

    button.logout-btn {
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      background-color: #FF6B35;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    button.logout-btn:hover {
      background-color: #cc5125;
    }

    .logo a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }

    .logo a span {
      color: #FF6B35;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header
    style="display:flex; justify-content:space-between; align-items:center; padding:1rem 2rem; border-bottom:1px solid #333;">
    <div class="logo">
      <a href="index.html">
        <img src="/images/logo.png" alt="BIGFOOT Logo" style="height:40px;" />
        <span>BIGFOOT Connect</span>
      </a>
    </div>
    <div style="display:flex; gap:1rem; align-items:center;">
      <button class="logout-btn" aria-label="Sair do sistema">Sair</button>
    </div>
  </header>

  <!-- Conteúdo principal -->
  <main>
    <h1>Bem-vindo ao seu Painel</h1>

    <div class="card">
      <h2>Seu progresso</h2>
      <p>Você já compartilhou: <strong>12.7 GB</strong></p>
      <p>Recompensas acumuladas: <strong>28.3 BIG</strong></p>
    </div>

    <div class="card">
      <h2>Carteira conectada</h2>
      <p>Endereço: <span id="walletDisplay">Não conectado</span></p>
      <button id="connectWallet" class="logout-btn">Conectar Phantom</button>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    © 2025 BIGFOOT Connect. Todos os direitos reservados.
  </footer>

  <!-- Script de conexão Phantom e controle de login/logout -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Verifica se está logado, caso contrário redireciona para login
      if (localStorage.getItem('loggedIn') !== 'true') {
        window.location.href = 'login.html';
        return;
      }

      // Exibe endereço da carteira salvo (se houver)
      const savedWallet = localStorage.getItem('walletAddress');
      const walletDisplay = document.getElementById('walletDisplay');
      if (savedWallet) {
        walletDisplay.textContent = savedWallet;
      }

      // Logout
      const logoutBtn = document.querySelector('.logout-btn');
      logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('loggedIn');
        localStorage.removeItem('walletAddress');
        window.location.href = 'index.html';
      });

      // Conectar carteira Phantom
      const connectWalletBtn = document.getElementById('connectWallet');
      connectWalletBtn.addEventListener('click', async () => {
        if (!window.solana?.isPhantom) {
          alert("Instale a carteira Phantom para conectar.");
          return;
        }

        try {
          const res = await window.solana.connect();
          walletDisplay.textContent = res.publicKey.toString();
          localStorage.setItem('walletAddress', res.publicKey.toString());
        } catch (err) {
          console.error("Erro ao conectar carteira:", err);
        }
      });
    });
  </script>
</body>

</html>
